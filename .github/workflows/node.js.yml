# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: e-commerce-backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/ 
    steps:
    - uses: actions/checkout@v4
    - name: Fix permissions before build
      run: sudo chown -R $USER:$USER .
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Clean workspace
      run: sudo rm -rf node_modules dist
    - run: npm ci
    - run: npm run build --if-present
    - run: touch .env
    - run: echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env
    - name: Restart PM2 properly
      run: |
        sudo pm2 stop e-commerce-backend || true
        sudo pm2 delete e-commerce-backend || true
        sudo pm2 start dist/index.js --name e-commerce-backend

    - name: Fix permissions after build
      run: sudo chmod -R 777 .

    
      
